name: e2e

# Live end-to-end test: bring the moav-client stack up against a REAL MoaV
# server bundle and prove traffic is tunnelled (endpoints parse → /api/probe
# validates → a fetch through SOCKS5 :1080 exits from the server's IP).
#
# NOT on the per-PR path — it needs Docker, the ~11-image client stack, and a
# reachable MoaV server. Runs on a SELF-HOSTED runner (label `moav-client-e2e`).
# Setup + the cross-repo "runner keeps a server up" plan: docs/devdocs/E2E-TESTING.md
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      verbose:
        description: "Dump client logs on completion"
        type: boolean
        default: false
      bundle_b64:
        description: "Base64 of a MoaV bundle .zip to test — overrides the secret. Make one on the server with: moav user base64 <user>  (or: base64 -w0 bundle.zip). NOTE: dispatch inputs are visible in the run metadata — use the secret for a long-lived server."
        type: string
        default: ""
      sub_url:
        description: "Subscription / moav:// URL to test — overrides the secret"
        type: string
        default: ""
      exit_ip:
        description: "Expected server egress IP for the assertion — overrides the secret (leave empty to accept any proxied exit)"
        type: string
        default: ""
      full_logs:
        description: "Capture full per-container log snapshots as artifacts (even on success)"
        type: boolean
        default: false
  release:
    types: [published]

concurrency:
  group: moav-client-e2e-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    runs-on: [self-hosted, moav-client-e2e]
    timeout-minutes: 40
    env:
      # A subscription/bundle for a fully-running MoaV test server, plus that
      # server's egress IP. A dispatch input (for ad-hoc testing of a deployed
      # server) overrides the secret (the standing test server); on push/release
      # the inputs are empty so the secrets are used.
      MOAV_TEST_SUB_URL: ${{ inputs.sub_url || secrets.MOAV_TEST_SUB_URL }}
      MOAV_TEST_BUNDLE_B64: ${{ inputs.bundle_b64 || secrets.MOAV_TEST_BUNDLE_B64 }}
      MOAV_TEST_EXIT_IP: ${{ inputs.exit_ip || secrets.MOAV_TEST_EXIT_IP }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight
        run: |
          docker --version && docker compose version
          test -n "$MOAV_TEST_SUB_URL" -o -n "$MOAV_TEST_BUNDLE_B64" \
            || { echo "::error::provide a config: the bundle_b64 / sub_url dispatch input, or the MOAV_TEST_SUB_URL / MOAV_TEST_BUNDLE_B64 secret"; exit 1; }

      - name: Materialise the test bundle (if provided as base64)
        if: env.MOAV_TEST_BUNDLE_B64 != ''
        run: |
          echo "$MOAV_TEST_BUNDLE_B64" | base64 -d > /tmp/moav-e2e-bundle.zip
          echo "MOAV_TEST_BUNDLE=/tmp/moav-e2e-bundle.zip" >> "$GITHUB_ENV"

      - name: Run the client e2e
        run: ART_DIR="$PWD/e2e-artifacts" bash tests/e2e-client.sh

      - name: Client logs (on failure, verbose, or full_logs)
        if: failure() || inputs.verbose || inputs.full_logs
        run: |
          mkdir -p e2e-artifacts
          docker compose logs --no-color > e2e-artifacts/compose-logs.txt 2>&1 || true
          docker compose ps > e2e-artifacts/compose-ps.txt 2>&1 || true
          if [ "${{ inputs.full_logs }}" = "true" ]; then
            for c in $(docker compose ps --services 2>/dev/null); do
              docker compose logs --no-color "$c" > "e2e-artifacts/log-$c.txt" 2>&1 || true
            done
          fi
          # Best-effort: redact the known exit IP in the captured logs (first…last).
          # The server DOMAIN can't be masked here (it isn't known to the workflow);
          # e2e-client.sh masks it in the live console, and artifacts are repo-scoped.
          if [ -n "$MOAV_TEST_EXIT_IP" ]; then
            esc=$(printf '%s' "$MOAV_TEST_EXIT_IP" | sed 's/[.[\*^$]/\\&/g')
            rep="$(printf '%s' "$MOAV_TEST_EXIT_IP" | cut -c1)…$(printf '%s' "$MOAV_TEST_EXIT_IP" | rev | cut -c1)"
            sed -i "s/$esc/$rep/g" e2e-artifacts/*.txt 2>/dev/null || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moav-client-e2e
          path: e2e-artifacts/
          if-no-files-found: ignore

      - name: Teardown (reclaim workspace)
        if: always()
        run: |
          docker compose down -v 2>/dev/null || true
          rm -f config.yaml /tmp/moav-e2e-bundle.zip data/e2e-bundle.zip 2>/dev/null || true
          # MoaV/client containers can leave root-owned files in bind mounts;
          # hand the workspace back so the next checkout can clean it.
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true
