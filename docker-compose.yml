networks:
  moav-net:
    driver: bridge

services:
  proxy-core:
    build:
      context: ./proxy-core
      args:
        # Stamped into the binary (cmd.Version) and shown in the dashboard
        # footer / `moav-client version`. Defaults to the in-code value.
        MOAV_VERSION: "${MOAV_VERSION:-1.3.0}"
    env_file:
      # Picks up SOCKS5_USERNAME / SOCKS5_PASSWORD / MOAV_DASHBOARD_USER /
      # MOAV_DASHBOARD_PASS for the listener and API basic-auth.
      - .env
    ports:
      # Host-side bind address is .env-driven so the dashboard's Network tab
      # can flip between loopback (default) and LAN/public exposure without
      # editing this file. See proxy-core/api `handleExposure`.
      - "${SOCKS5_BIND:-127.0.0.1}:1080:1080"   # SOCKS5
      - "${HTTP_BIND:-127.0.0.1}:8081:8080"     # HTTP CONNECT
      - "${API_BIND:-127.0.0.1}:8088:8088"      # REST/WebSocket API
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      # geoip CIDR lists for `geoip:` routing rules. Mounted (not baked into
      # the scratch image) so operators can edit lists without a rebuild.
      - ./geoip:/app/geoip:ro
      # .env is read by docker-compose from the host and written by the
      # dashboard's Network exposure setting from inside proxy-core. Mount
      # the file (created by install.sh if absent) so both sides see the
      # same bytes.
      - ./.env:/app/.env
      # Mount docker socket so the dashboard can stop/start sidecar containers
      # when the user toggles a sidecar endpoint on/off. Read-only access is
      # enough for query, RW for start/stop. Comment out for a hardened setup.
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    networks:
      - moav-net
    restart: unless-stopped
    healthcheck:
      # proxy-core is FROM scratch (no wget/sh) — the binary self-checks.
      test: ["CMD", "/proxy-core", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  # sing-box does the actual VLESS / Reality / Trojan / SS-2022 / Hy2 /
  # WireGuard cryptography. It waits for /etc/sing-box/singbox.json
  # (generated by proxy-core on serve startup), then exposes one SOCKS5
  # inbound per endpoint on 10800+.
  singbox:
    # Pinned; override the whole ref with IMAGE_SINGBOX in .env.
    image: ${IMAGE_SINGBOX:-ghcr.io/sagernet/sing-box:v1.13.12}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[singbox] waiting for /etc/sing-box/singbox.json ..."
        while [ ! -s /etc/sing-box/singbox.json ]; do sleep 1; done
        echo "[singbox] config detected, starting"
        exec /usr/local/bin/sing-box run -c /etc/sing-box/singbox.json
    volumes:
      - ./data:/etc/sing-box
    networks:
      - moav-net
    restart: unless-stopped
    healthcheck:
      # Healthy if there's no config yet (idling) OR the generated config
      # parses — catches a bad generator without flagging a correct idle.
      test: ["CMD-SHELL", "[ ! -s /etc/sing-box/singbox.json ] || sing-box check -c /etc/sing-box/singbox.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # SNI spoofing sidecar — slips a decoy ClientHello onto the wire BEFORE
  # the real TLS handshake, so DPI sees the fake SNI on the connection.
  # Only activates when at least one endpoint in the bundle has fake_sni
  # set (or sni_spoof.default_fake_sni applies one globally).
  # Requires NET_ADMIN (sets BPF / raw sockets for CH injection).
  sni-spoof:
    build: ./sidecars/sni-spoof
    profiles: [sni-spoof, all-sidecars]
    cap_add: [NET_ADMIN, NET_RAW]
    volumes:
      - ./data:/etc/sni-spoof
    networks: [moav-net]
    restart: unless-stopped

  # Xray-core handles transports sing-box can't speak — currently xhttp
  # and splithttp (Xray-specific VLESS transports). proxy-core generates
  # data/xray.json only when there are endpoints in the bundle that need
  # it; otherwise xray idles in its config-wait loop.
  xray:
    # Official XTLS binary, pinned via XRAY_VERSION (see .env / .env.example).
    # Built locally rather than pulled from a third-party image, matching the
    # MoaV server. ./sidecars/xray/Dockerfile downloads the official release.
    build:
      context: ./sidecars/xray
      args:
        XRAY_VERSION: "${XRAY_VERSION:-v26.5.9}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[xray] waiting for /etc/xray/xray.json ..."
        while [ ! -s /etc/xray/xray.json ]; do sleep 1; done
        echo "[xray] config detected, starting"
        exec /usr/local/bin/xray run -c /etc/xray/xray.json
    healthcheck:
      # xray only gets a config when the bundle has xhttp/splithttp endpoints;
      # otherwise it idles. Healthy if no config yet OR the config parses.
      test: ["CMD-SHELL", "[ ! -s /etc/xray/xray.json ] || xray run -test -c /etc/xray/xray.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./data:/etc/xray
    networks:
      - moav-net
    restart: unless-stopped

  web-ui:
    build: ./web-ui
    env_file:
      # MOAV_DASHBOARD_USER / MOAV_DASHBOARD_PASS → nginx generates dashboard
      # basic-auth from these at startup (40-moav-auth.sh).
      - .env
    ports:
      - "${UI_BIND:-127.0.0.1}:3001:3000"
    depends_on:
      - proxy-core
    networks:
      - moav-net
    restart: unless-stopped
    volumes:
      # Live .env so a restart re-reads dashboard creds the user just set
      # (same bytes proxy-core writes from the Network exposure setting).
      - ./.env:/etc/moav/.env:ro
    healthcheck:
      # /healthz is exempt from basic-auth so the check passes when auth is on.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Caddy reverse proxy → HTTPS termination for the dashboard + API.
  # Self-signed cert by default (Caddy's internal CA); set MOAV_DOMAIN to a
  # real hostname and MOAV_TLS_ISSUER=acme to get Let's Encrypt.
  # Enable with `docker compose --profile https up -d caddy`.
  # ---------------------------------------------------------------------------
  caddy:
    image: ${IMAGE_CADDY:-caddy:2}
    profiles: [https, all-sidecars]
    ports:
      # Default to high ports so we don't fight any other web server on 80/443.
      # Flip CADDY_HTTP_PORT / CADDY_HTTPS_PORT to "80" / "443" once you're
      # sure nothing else is binding them.
      - "${HTTPS_BIND:-127.0.0.1}:${CADDY_HTTP_PORT:-8443}:80"
      - "${HTTPS_BIND:-127.0.0.1}:${CADDY_HTTPS_PORT:-8444}:443"
    volumes:
      - ./sidecars/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - MOAV_DOMAIN=${MOAV_DOMAIN:-localhost}
      - MOAV_TLS_ISSUER=${MOAV_TLS_ISSUER:-internal}
      - MOAV_ACME_EMAIL=${MOAV_ACME_EMAIL:-admin@localhost}
    networks: [moav-net]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Sidecars — each exposes a SOCKS5 inbound at a well-known port on moav-net,
  # consumed via Endpoint.Config["socks5_addr"]. Enable individually in
  # config.yaml -> sidecars; the matching --profile flag runs the container.
  # ---------------------------------------------------------------------------

  masterdns:
    build: ./sidecars/dns-tunnels
    profiles: [masterdns, all-sidecars]
    volumes:
      - ./data/sidecar-configs/masterdns:/etc/masterdns
    networks: [moav-net]
    restart: unless-stopped

  amneziawg:
    build: ./sidecars/amneziawg
    profiles: [amneziawg, all-sidecars]
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    volumes:
      - ./data/sidecar-configs/amneziawg:/etc/amneziawg
    networks: [moav-net]
    restart: unless-stopped

  trusttunnel:
    build: ./sidecars/trusttunnel
    profiles: [trusttunnel, all-sidecars]
    volumes:
      - ./data/sidecar-configs/trusttunnel:/etc/trusttunnel
    networks: [moav-net]
    restart: unless-stopped

  psiphon:
    build: ./sidecars/psiphon
    profiles: [psiphon, all-sidecars]
    volumes:
      - ./data/sidecar-configs/psiphon:/etc/psiphon
      - psiphon-data:/var/lib/psiphon
    networks: [moav-net]
    restart: unless-stopped

  dns-tunnels:
    build: ./sidecars/dns-tunnels
    profiles: [dns-tunnels]
    networks: [moav-net]
    restart: unless-stopped

  tor:
    image: ${IMAGE_TOR:-peterdavehello/tor-socks-proxy:latest}
    profiles: [tor, all-sidecars]
    networks: [moav-net]
    restart: unless-stopped
    # Tor SOCKS5 on :9150 (matches SidecarManager). Override the image's
    # default healthcheck — it fetches a Facebook .onion over the circuit,
    # which is strict and slow/blocked on many networks, leaving the
    # container "unhealthy" while the proxy works fine. A port-open check
    # reflects readiness; the moav probe validates real egress.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9150"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  psiphon-data:
  caddy-data:
  caddy-config:
