version: "3.9"

networks:
  moav-net:
    driver: bridge

services:
  proxy-core:
    build: ./proxy-core
    ports:
      - "1080:1080"   # SOCKS5
      - "8081:8080"   # HTTP CONNECT (host 8081 — 8080 often busy)
      - "8088:8088"   # REST/WebSocket API
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    working_dir: /app
    networks:
      - moav-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # sing-box does the actual VLESS/Reality/Trojan/SS/Hysteria2 cryptography.
  # It waits for /etc/sing-box/config.json (generated by proxy-core on first
  # serve), then exposes one SOCKS5 inbound per endpoint on 10800+.
  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[singbox] waiting for /etc/sing-box/singbox.json ..."
        while [ ! -s /etc/sing-box/singbox.json ]; do sleep 1; done
        echo "[singbox] config detected, starting"
        exec /usr/local/bin/sing-box run -c /etc/sing-box/singbox.json
    volumes:
      - ./data:/etc/sing-box
    networks:
      - moav-net
    restart: unless-stopped

  web-ui:
    build: ./web-ui
    ports:
      - "3001:3000"
    depends_on:
      - proxy-core
    networks:
      - moav-net
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://proxy-core:8088
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  dns-tunnels:
    build: ./sidecars/dns-tunnels
    profiles:
      - dns-tunnels
    networks:
      - moav-net
    restart: unless-stopped

  psiphon:
    build: ./sidecars/psiphon
    profiles:
      - psiphon
    networks:
      - moav-net
    restart: unless-stopped

  tor:
    image: torproject/arti:latest
    profiles:
      - tor
    networks:
      - moav-net
    restart: unless-stopped
