# WebSocket upgrade mapping (http context).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Optional dashboard basic-auth. The entrypoint (40-moav-auth.sh) writes this
    # file: an auth_basic block when MOAV_DASHBOARD_USER/PASS are set, otherwise
    # `auth_basic off;`. Declared at server scope so it covers the UI *and* the
    # proxied /api on this single origin.
    include /etc/nginx/moav-auth.conf;

    # Unauthenticated liveness endpoint for the container healthcheck.
    location = /healthz {
        auth_basic off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Docker embedded DNS, so proxy-core is resolved at request time — nginx
    # won't fail to start if proxy-core comes up a moment later.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API + WebSocket → proxy-core (single origin; the basic-auth above applies).
    location /api/ {
        set $upstream http://proxy-core:8088;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # Always revalidate the entry HTML so a new build's hashed bundle is picked
    # up instead of a stale one cached by the browser (notably mobile Safari).
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Content-hashed assets (index-<hash>.js/.css) never change → cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
